<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    
    <link rel="stylesheet" href="login.css?v=1">
</head>
<body>
    <div class="login-box">
        <h2>Ingreso Admin</h2>
        <div id="error-msg">Credenciales incorrectas</div>
        <input type="email" id="log-email" placeholder="Email (admin@tienda.com)" value="admin@tienda.com" onkeyup="if(event.key === 'Enter') iniciarSesion()">
        <input type="password" id="log-pass" placeholder="Contraseña (admin123)" onkeyup="if(event.key === 'Enter') iniciarSesion()">
        <button onclick="iniciarSesion()">Ingresar</button>
    </div>

    <script src="login.js?v=1"></script>
</body>
</html>
