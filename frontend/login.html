<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #111; margin-top: 0; }
        input { width: 100%; padding: 15px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; transition: 0.2s;}
        input:focus { border-color: #111; }
        button { background: #111; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #333; }
        #error-msg { color: #e74c3c; font-size: 0.9rem; margin-bottom: 15px; display: none; font-weight: 600;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Ingreso Admin</h2>
        <div id="error-msg">Credenciales incorrectas</div>
        <input type="email" id="log-email" placeholder="Email (admin@tienda.com)" value="admin@tienda.com" onkeyup="if(event.key === 'Enter') iniciarSesion()">
        <input type="password" id="log-pass" placeholder="Contraseña (admin123)" onkeyup="if(event.key === 'Enter') iniciarSesion()">
        <button onclick="iniciarSesion()">Ingresar</button>
    </div>

    <script>
        async function iniciarSesion() {
            const email = document.getElementById('log-email').value;
            const password = document.getElementById('log-pass').value;
            
            try {
                const res = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    // Guardamos el Carnet VIP (Token)
                    localStorage.setItem('tokenTienda', data.token);
                    window.location.href = 'admin.html'; // Te manda al admin
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                    document.getElementById('error-msg').innerText = data.error || 'Credenciales incorrectas';
                }
            } catch (err) {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').innerText = 'Error de conexión. ¿Está prendido el servidor?';
            }
        }
    </script>
</body>
</html>
